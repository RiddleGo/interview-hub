<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>题解目录 · leetcode-python</title>
  <style>
    body { margin: 0; background: #0f172a; color: #e2e8f0; font-family: Arial, "Microsoft YaHei", sans-serif; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 24px 16px 40px; }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { color: #94a3b8; margin: 0 0 16px; }
    a { color: #22d3ee; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .actions { margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { padding: 8px 12px; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; }
    .btn:hover { border-color: #22d3ee; text-decoration: none; }
    #status { color: #94a3b8; margin-bottom: 12px; }
    ul { margin: 0; padding-left: 20px; }
    li { margin: 6px 0; }
    code { background: #1e293b; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>题解目录</h1>
    <p>点击条目后会在 HTML 页面中渲染 Markdown，不再显示源码文本。</p>
    <div class="actions">
      <a class="btn" href="../index.html">返回 leetcode-python 首页</a>
      <a class="btn" href="../md-viewer.html?file=problems/README.md">打开目录 README</a>
    </div>
    <div id="status">正在加载目录...</div>
    <ul id="list"></ul>
  </main>

  <script>
    (async function () {
      const status = document.getElementById("status");
      const list = document.getElementById("list");
      try {
        const resp = await fetch("../manifest.json", { cache: "no-store" });
        if (!resp.ok) throw new Error("manifest load failed: " + resp.status);
        const manifest = await resp.json();
        const keys = Object.keys(manifest.solutions || {})
          .filter((k) => k.endsWith(".md"))
          .sort((a, b) => a.localeCompare(b, "zh-CN"));

        status.textContent = "共 " + keys.length + " 篇文档";
        for (const key of keys) {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = "../md-viewer.html?file=" + encodeURIComponent("problems/" + key);
          a.textContent = key;
          li.appendChild(a);
          list.appendChild(li);
        }
      } catch (err) {
        status.textContent = "目录加载失败：" + String(err);
      }
    })();
  </script>
</body>
</html>
