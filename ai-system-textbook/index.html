(function () {
  const BRANCH = "main";

  /** @type {{ documents: Array<{path:string,title:string,chapterFolder:string|null,raw:string,github:string,chapterGithub:string}> }} */
  let manifest = null;
  /** @type {Map<string, object>} */
  let byPath = new Map();

  function repoPathFromRawFileUrl(rawUrl) {
    const u = new URL(rawUrl);
    const needle = "/" + BRANCH + "/";
    const i = u.pathname.indexOf(needle);
    if (i === -1) return null;
    return decodeURIComponent(u.pathname.slice(i + needle.length));
  }

  function dirnameRawUrl(rawFileUrl) {
    const u = new URL(rawFileUrl);
    u.pathname = u.pathname.replace(/\/[^/]+$/, "/");
    return u.href;
  }

  function setHashPath(path) {
    location.hash = "doc=" + encodeURIComponent(path);
  }

  function readEmbeddedManifest() {
    const ta = document.getElementById("textbook-manifest-json");
    if (!ta) return null;
    const raw = (ta.textContent || "").trim();
    if (!raw) return null;
    try {
      const data = JSON.parse(raw);
      if (data && Array.isArray(data.documents) && data.documents.length) return data;
    } catch (_) {}
    return null;
  }

  function getHashPath() {
    const h = location.hash.replace(/^#/, "");
    const m = h.match(/^doc=(.+)$/);
    if (!m) return null;
    try {
      return decodeURIComponent(m[1]);
    } catch {
      return null;
    }
  }

  function renderSidebar() {
    const nav = document.getElementById("sidebar");
    nav.innerHTML = "";
    const groups = new Map();
    const rootDocs = [];
    for (const d of manifest.documents) {
      if (d.chapterFolder) {
        if (!groups.has(d.chapterFolder)) groups.set(d.chapterFolder, []);
        groups.get(d.chapterFolder).push(d);
      } else {
        rootDocs.push(d);
      }
    }
    function addGroup(title, docs) {
      const det = document.createElement("details");
      det.className = "nav-group";
      det.open = true;
      const sum = document.createElement("summary");
      sum.textContent = title;
      det.appendChild(sum);
      const ul = document.createElement("ul");
      for (const d of docs) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = "#doc=" + encodeURIComponent(d.path);
        a.textContent = d.title;
        a.dataset.path = d.path;
        li.appendChild(a);
        ul.appendChild(li);
      }
      det.appendChild(ul);
      nav.appendChild(det);
    }
    if (rootDocs.length) addGroup("教材首页与参考", rootDocs);
    const chapters = [...groups.keys()].sort((a, b) => {
      const ma = a.match(/第(\d+)章/);
      const mb = b.match(/第(\d+)章/);
      const na = ma ? parseInt(ma[1], 10) : 999;
      const nb = mb ? parseInt(mb[1], 10) : 999;
      return na !== nb ? na - nb : a.localeCompare(b, "zh-CN");
    });
    for (const ch of chapters) addGroup(ch, groups.get(ch));
  }

  function highlightActive(path) {
    document.querySelectorAll("#sidebar a").forEach((a) => {
      a.classList.toggle("active", a.dataset.path === path);
    });
  }

  function patchDomPaths(articleEl, currentDoc) {
    const base = dirnameRawUrl(currentDoc.raw);
    articleEl.querySelectorAll("img[src]").forEach((img) => {
      const s = img.getAttribute("src");
      if (!s || /^https?:/i.test(s) || s.startsWith("data:")) return;
      try {
        img.setAttribute("src", new URL(s, base).href);
      } catch (_) {}
    });
    articleEl.querySelectorAll("a[href]").forEach((a) => {
      const h = a.getAttribute("href");
      if (!h || /^https?:/i.test(h) || h.startsWith("#") || h.startsWith("mailto:")) return;
      if (!h.endsWith(".md")) return;
      try {
        const abs = new URL(h, base).href;
        const rel = repoPathFromRawFileUrl(abs);
        if (rel && byPath.has(rel)) {
          a.setAttribute("href", "#doc=" + encodeURIComponent(rel));
        }
      } catch (_) {}
    });
  }

  async function loadDoc(path) {
    const doc = byPath.get(path);
    const status = document.getElementById("status");
    const article = document.getElementById("article");
    if (!doc) {
      status.style.display = "block";
      status.className = "error";
      status.textContent = "找不到文档：" + path;
      article.style.display = "none";
      return;
    }
    status.style.display = "block";
    status.className = "";
    status.textContent = "正在加载正文…";
    article.style.display = "none";

    document.getElementById("doc-title").textContent = doc.title;
    document.getElementById("lnk-file").href = doc.github;
    const ch = document.getElementById("lnk-chapter");
    if (doc.chapterFolder) {
      ch.style.display = "inline";
      ch.href = doc.chapterGithub;
    } else {
      ch.style.display = "none";
    }
    document.getElementById("doc-meta").textContent = doc.path + " · manifest " + (manifest.generated || "");

    const res = await fetch(doc.raw, { cache: "force-cache" });
    if (!res.ok) throw new Error("无法拉取正文 " + res.status);
    const md = await res.text();

    marked.setOptions({ gfm: true, breaks: false, mangle: false, headerIds: true });
    article.innerHTML = marked.parse(md);
    article.querySelectorAll("pre code").forEach((el) => {
      try {
        hljs.highlightElement(el);
      } catch (_) {}
    });
    patchDomPaths(article, doc);
    article.style.display = "block";
    status.style.display = "none";
    highlightActive(path);
  }

  async function boot() {
    const status = document.getElementById("status");
    try {
      manifest = readEmbeddedManifest();
      if (!manifest) {
        const res = await fetch("manifest.json", { cache: "no-cache" });
        if (!res.ok) throw new Error("manifest.json HTTP " + res.status);
        manifest = await res.json();
      }
      for (const d of manifest.documents) byPath.set(d.path, d);
      renderSidebar();
      status.style.display = "none";

      function route() {
        let p = getHashPath();
        if (!p || !byPath.has(p)) {
          const readme = manifest.documents.find((d) => d.path.endsWith("/README.md") || d.path === "Textbook/README.md");
          p = (readme && readme.path) || manifest.documents[0].path;
          setHashPath(p);
          return;
        }
        loadDoc(p).catch((e) => {
          status.style.display = "block";
          status.className = "error";
          status.textContent = String(e.message || e);
        });
      }
      window.addEventListener("hashchange", route);
      route();
    } catch (e) {
      status.className = "error";
      status.textContent =
        "无法加载目录数据。请在本目录执行：python scripts/build_manifest.py（会把清单写入 index.html 内嵌区域并更新 manifest.json），然后刷新或重新双击打开。详情：" +
        (e && e.message ? e.message : e);
    }
  }

  boot();
})();
  </script>
</body>
</html>
