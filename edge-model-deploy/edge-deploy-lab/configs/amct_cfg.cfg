# AMCT PTQ configuration template (Ascend Model Compression Toolkit)
# Copy and edit for your CANN version. See docs/03-量化与校准.md
#
# Usage (example, paths vary by CANN install):
#   amct_onnx calibration --model model_adapt.onnx \
#     --save_path deliverables/03_quant/ \
#     --config_file configs/amct_cfg.cfg

[common]
skip_layers_file = configs/skip_layers.txt

[calibration]
input_data_dir = calib/npy
input_shape = images:1,3,640,640

[quantization]
quant_mode = weight_activation
activation_quantize = true
weight_quantize = true
activation_method = minmax
weight_method = arq
