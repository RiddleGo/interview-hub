<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>打开单页学习…</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #0c0e14; color: #eef2f8; min-height: 100vh; display: flex; flex-direction: column; }
    #bar {
      padding: .6rem 1rem;
      font-size: .85rem;
      background: #151922;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
    }
    #bar a { color: #3ee0c9; }
    #err { color: #f87171; padding: 1rem; display: none; }
    iframe { flex: 1; width: 100%; border: 0; min-height: 0; background: #fff; }
  </style>
</head>
<body>
  <div id="bar">
    <span id="status">正在加载单页…</span>
    <a id="direct" href="#" target="_blank" rel="noopener">若仍为源码，点此在新标签直接打开 Pages</a>
  </div>
  <div id="err"></div>
  <iframe id="frame" title="study"></iframe>
  <script>
    (function () {
      var allowed = {
        "agent-interview-300": 1,
        "ai-infra-interview-305": 1,
        "autodrive-interview-300": 1,
        "sgr-interview-300": 1
      };
      var params = new URLSearchParams(location.search);
      var repo = params.get("repo") || "";
      if (!allowed[repo]) {
        document.getElementById("status").textContent = "参数 repo 无效";
        document.getElementById("err").style.display = "block";
        document.getElementById("err").textContent = "请从导航站首页进入，或带上 ?repo=agent-interview-300 等参数。";
        return;
      }
      var owner = "riddlego";
      var pagesUrl = "https://" + owner + ".github.io/" + repo + "/study.html";
      document.getElementById("direct").href = pagesUrl;

      fetch(pagesUrl, { cache: "no-cache", credentials: "omit" })
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.text();
        })
        .then(function (html) {
          var baseHref = pagesUrl.replace(/\/[^/]*$/, "/");
          if (!/<base[\s>]/i.test(html)) {
            html = html.replace(/<head([^>]*)>/i, "<head$1><base href=\"" + baseHref + "\">");
          }
          var blob = new Blob([html], { type: "text/html;charset=utf-8" });
          var u = URL.createObjectURL(blob);
          document.getElementById("frame").src = u;
          document.getElementById("status").textContent = "已加载：" + repo + "（Blob + iframe，避免纯文本显示）";
        })
        .catch(function (e) {
          document.getElementById("status").textContent = "加载失败，已退回直链";
          document.getElementById("err").style.display = "block";
          document.getElementById("err").textContent = String(e.message || e);
          document.getElementById("frame").src = pagesUrl;
        });
    })();
  </script>
</body>
</html>
