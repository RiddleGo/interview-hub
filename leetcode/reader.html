<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>加载中… · 算法小抄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css" />
  <style>
    :root {
      --bg: #0c0e14;
      --card: #151922;
      --border: rgba(255, 255, 255, 0.08);
      --text: #eef2f8;
      --muted: #8b95a8;
      --a: #3ee0c9;
      --accent: #a78bfa;
      --leetcode: #ffa657;
      --radius: 14px;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      background-image:
        radial-gradient(ellipse 80% 50% at 100% 0%, rgba(62, 224, 201, 0.06), transparent 50%),
        radial-gradient(ellipse 60% 40% at 0% 100%, rgba(167, 139, 250, 0.06), transparent 45%);
    }
    .top {
      max-width: 920px;
      margin: 0 auto;
      padding: 1rem 1.25rem 0;
    }
    .top a {
      color: var(--a);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .top a:hover { text-decoration: underline; }
    .markdown-body {
      box-sizing: border-box;
      max-width: 920px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 4rem;
      background: transparent !important;
      font-size: 1rem;
      line-height: 1.75;
    }
    .markdown-body > :first-child { margin-top: 0 !important; }
    .markdown-body h1 {
      font-size: clamp(1.5rem, 4vw, 1.85rem);
      letter-spacing: -0.02em;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem !important;
    }
    .markdown-body h2 {
      margin-top: 2rem !important;
      font-size: 1.25rem;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.35rem;
    }
    .markdown-body h3 { margin-top: 1.5rem !important; font-size: 1.05rem; }
    .markdown-body a { color: var(--a); }
    .markdown-body a:hover { color: #6ee8d8; }
    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }
    .markdown-body img {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .markdown-body pre {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border) !important;
      background: #0a0d12 !important;
    }
    .markdown-body pre code {
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: 0.88rem;
    }
    .markdown-body code:not(pre code) {
      background: rgba(167, 139, 250, 0.12);
      color: #d4c4ff;
      padding: 0.15em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;
    }
    .markdown-body blockquote {
      border-left: 3px solid var(--accent);
      background: rgba(167, 139, 250, 0.06);
      border-radius: 0 10px 10px 0;
      color: var(--muted);
    }
    .markdown-body table { display: block; overflow-x: auto; }
    .markdown-body table th,
    .markdown-body table td { border-color: var(--border) !important; }
    .markdown-body p:empty { display: none; }

    .related-links,
    .leetcode-links,
    .notice-block {
      margin: 1rem 0 1.5rem;
      padding: 1rem 1.15rem;
      border-radius: var(--radius);
    }
    .card-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.65rem;
    }
    .related-links {
      border: 1px solid rgba(62, 224, 201, 0.22);
      background: linear-gradient(135deg, rgba(62, 224, 201, 0.07), rgba(167, 139, 250, 0.05));
    }
    .related-links .card-label { color: var(--a); }
    .related-links ul,
    .leetcode-links ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .related-links li,
    .leetcode-links li { margin: 0; }
    .related-links a,
    .leetcode-links a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--text) !important;
      text-decoration: none !important;
      font-size: 0.92rem;
      font-weight: 600;
      transition: border-color 0.15s, background 0.15s;
    }
    .related-links a::before {
      content: "→";
      color: var(--a);
      font-weight: 700;
      flex-shrink: 0;
    }
    .related-links a:hover {
      border-color: rgba(62, 224, 201, 0.35);
      background: rgba(62, 224, 201, 0.08);
    }
    .leetcode-links {
      border: 1px solid rgba(255, 166, 87, 0.25);
      background: linear-gradient(135deg, rgba(255, 166, 87, 0.08), rgba(167, 139, 250, 0.04));
    }
    .leetcode-links .card-label { color: var(--leetcode); }
    .leetcode-links .card-intro {
      margin: 0 0 0.75rem;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .leetcode-links a::before {
      content: "LC";
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--leetcode);
      background: rgba(255, 166, 87, 0.15);
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .leetcode-links a:hover {
      border-color: rgba(255, 166, 87, 0.4);
      background: rgba(255, 166, 87, 0.1);
    }
    .notice-block {
      border: 1px solid rgba(167, 139, 250, 0.25);
      background: rgba(167, 139, 250, 0.07);
      font-size: 0.92rem;
      color: #c8d0e0;
      line-height: 1.65;
    }
    .notice-block .card-label { color: var(--accent); }
    .notice-block .notice-body { margin: 0; }
    .notice-block .notice-body p { margin: 0; }
    .notice-block strong { color: var(--text); }

    .markdown-body p.emphasis-lead {
      margin-top: 1.25rem;
      padding: 0.65rem 0.85rem;
      border-left: 3px solid var(--accent);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 0 8px 8px 0;
    }
    .markdown-body p.emphasis-lead strong { color: var(--text); }

    .err { color: #f87171; padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <div class="top"><a href="index.html">← 返回章节目录</a></div>
  <article id="content" class="markdown-body">加载中…</article>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    marked.use({ gfm: true, breaks: false });

    function renderMdFragment(text) {
      let html = marked.parse(String(text).trim());
      html = html.replace(/^<p>([\s\S]*)<\/p>\s*$/i, "$1");
      return html;
    }

    function extractMdLinks(block) {
      return [...block.matchAll(/\[([^\]]+)\]\(([^)]+)\)/g)].map((m) => ({
        title: m[1],
        href: m[2],
      }));
    }

    function buildLinkList(links, className) {
      if (!links.length) return "";
      const items = links
        .map(
          (l) =>
            '  <li><a href="' +
            l.href +
            '" target="_blank" rel="noopener noreferrer">' +
            l.title +
            "</a></li>"
        )
        .join("\n");
      return (
        '<aside class="' +
        className +
        '">\n<div class="card-label">' +
        (className === "leetcode-links" ? "LeetCode 题目" : "相关推荐") +
        '</div>\n<ul>\n' +
        items +
        "\n</ul>\n</aside>\n\n"
      );
    }

    function buildRelatedLinks(block) {
      const links = extractMdLinks(block);
      return buildLinkList(links, "related-links");
    }

    function buildLeetcodeBlock(block) {
      const lines = block.trim().split("\n");
      const intro = lines[0] || "";
      const links = extractMdLinks(block);
      if (!links.length) return block;
      const items = links
        .map(
          (l) =>
            '  <li><a href="' +
            l.href +
            '" target="_blank" rel="noopener noreferrer">' +
            l.title +
            "</a></li>"
        )
        .join("\n");
      return (
        '<aside class="leetcode-links">\n' +
        '<div class="card-label">LeetCode 题目</div>\n' +
        '<p class="card-intro">' +
        renderMdFragment(intro) +
        "</p>\n<ul>\n" +
        items +
        "\n</ul>\n</aside>\n\n"
      );
    }

    function buildNoticeBlock(block) {
      const body = renderMdFragment(block.trim());
      return (
        '<aside class="notice-block">\n' +
        '<div class="card-label">通知</div>\n' +
        '<div class="notice-body">' +
        body +
        "</div>\n</aside>\n\n"
      );
    }

    function preprocessMd(md) {
      md = md.replace(/<p align=['']center['']>[\s\S]*?<\/p>\s*/gi, "");

      md = md.replace(/^#{1,6}\s+\*\*(.+?)\*\*\s*$/gm, (m, t) =>
        m.replace("**" + t + "**", t)
      );

      md = md.replace(
        /相关推荐：\s*\n+((?:[ \t]*[-*][^\n]+\n*)+)/g,
        (_, list) => buildRelatedLinks(list)
      );

      md = md.replace(
        /^(读完本文[\s\S]*?\n\n(?:\[[\d]+[^\]]*\]\([^)]+\)\s*\n*)+)/m,
        (_, block) => buildLeetcodeBlock(block)
      );

      md = md.replace(
        /^---\s*\n+\s*(通知：[^\n]+(?:\n(?![\n#])[^\n]+)*)/m,
        (_, notice) => buildNoticeBlock(notice)
      );

      return md;
    }

    function hasRawMarkdown(el) {
      const html = el.innerHTML;
      return (
        (/\*\*[^*]+\*\*/.test(html) || /(?:^|>)\*[^*\n]+\*(?:<|$)/.test(html)) &&
        !el.querySelector("strong, em, code, a")
      );
    }

    function fixRawMarkdownNodes(root) {
      root.querySelectorAll("p, li, td, blockquote").forEach((el) => {
        if (hasRawMarkdown(el)) {
          el.innerHTML = renderMdFragment(el.textContent);
        }
      });
    }

    function enhanceContent(root) {
      root.querySelectorAll("p").forEach((p) => {
        if (p.closest(".related-links, .leetcode-links, .notice-block")) return;

        const text = p.textContent.trim();

        if (/^相关推荐：/.test(text) && !p.closest(".related-links")) {
          const html = buildRelatedLinks(text);
          if (html) {
            const wrap = document.createElement("div");
            wrap.innerHTML = html;
            p.replaceWith(wrap.firstElementChild);
          }
          return;
        }

        if (/^通知：/.test(text) && !p.closest(".notice-block")) {
          const aside = document.createElement("aside");
          aside.className = "notice-block";
          aside.innerHTML =
            '<div class="card-label">通知</div><div class="notice-body">' +
            renderMdFragment(text) +
            "</div>";
          p.replaceWith(aside);
          return;
        }

        if (/^读完本文/.test(text)) {
          const lines = [text];
          let sib = p.nextElementSibling;
          const toRemove = [];
          while (sib && sib.tagName === "P" && /^\[\d+\./.test(sib.textContent.trim())) {
            lines.push(sib.textContent.trim());
            toRemove.push(sib);
            sib = sib.nextElementSibling;
          }
          const wrap = document.createElement("div");
          wrap.innerHTML = buildLeetcodeBlock(lines.join("\n\n"));
          p.replaceWith(wrap.firstElementChild);
          toRemove.forEach((el) => el.remove());
          return;
        }

        if (/^\*\*\d+、/.test(text) && text.includes("**")) {
          p.classList.add("emphasis-lead");
        }
      });

      fixRawMarkdownNodes(root);
    }

    const params = new URLSearchParams(location.search);
    const path = params.get("path");
    const content = document.getElementById("content");
    if (!path || path.includes("..")) {
      content.innerHTML = '<p class="err">无效的文章路径</p>';
    } else {
      document.title = path.split("/").pop().replace(/\.md$/, "") + " · 算法小抄";
      fetch(path)
        .then((r) => {
          if (!r.ok) throw new Error(r.status);
          return r.text();
        })
        .then((md) => {
          content.innerHTML = marked.parse(preprocessMd(md));
          enhanceContent(content);
        })
        .catch(() => {
          content.innerHTML = '<p class="err">无法加载文章：' + path + "</p>";
        });
    }
  </script>
</body>
</html>
